name: DataLens CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./datalens-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: datalens-backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      # ── Unit Tests (pure, no DB required) ────────────────────────────────
      - name: Unit Tests - engine (formula / visual_etl / anomaly / aggregator)
        run: go test ./internal/engine/... -v -count=1 -timeout 120s

      - name: Unit Tests - parser (pbix / tableau / pptx)
        run: go test ./internal/parser/... -v -count=1 -timeout 120s

      # ── Full build verification ───────────────────────────────────────────
      - name: Build binary
        run: go build -o /tmp/datalens-server ./cmd/server/

      # ── Security advisory (non-blocking) ─────────────────────────────────
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npm run build

  # ─── Integration / Smoke Tests ─────────────────────────────────────────────
  smoke:
    name: Smoke Tests (API)
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: datalens
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: datalens-backend/go.sum

      - name: Download modules
        working-directory: ./datalens-backend
        run: go mod download

      - name: Build and start backend
        working-directory: ./datalens-backend
        env:
          # These must EXACTLY match config.go env var key names
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/datalens
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: smoke-test-jwt-secret-minimum-32-chars!!
          PORT: "8080"
          ENV: test
          CORS_ORIGINS: "*"
          # S3 / MinIO optional — leave empty
          S3_ENDPOINT: ""
          S3_ACCESS_KEY: ""
          S3_SECRET_KEY: ""
          S3_BUCKET: datalens
          # AI optional
          AI_API_KEY: ""
          # No static files in CI
          STATIC_DIR: ""
        run: |
          go build -o /tmp/datalens-server ./cmd/server/
          /tmp/datalens-server &
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8080/health || { echo "Health check failed"; exit 1; }

      - name: Run smoke tests
        run: |
          chmod +x ./datalens-backend/scripts/smoke_test.sh
          ./datalens-backend/scripts/smoke_test.sh http://localhost:8080/api/v1

  # ─── Docker image (main branch only) ───────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./datalens-backend
          push: false
          tags: |
            datalens-backend:${{ github.sha }}
            datalens-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
