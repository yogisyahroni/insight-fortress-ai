name: DataLens CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"

jobs:
  # ─── 1. Backend ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./datalens-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: datalens-backend/go.sum

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit Tests - engine
        run: go test ./internal/engine/... -v -count=1 -timeout 120s

      - name: Unit Tests - parser
        run: go test ./internal/parser/... -v -count=1 -timeout 120s

      - name: Build binary
        run: go build -o /tmp/datalens-server ./cmd/server/

      - name: govulncheck (advisory only)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || true

  # ─── 2. Frontend ────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vite production build
        run: npm run build

  # ─── 3. Docker Build (main only) ────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./datalens-backend
          push: false
          tags: |
            datalens-backend:${{ github.sha }}
            datalens-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
