<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Lens body (eye shape) -->
  <ellipse cx="32" cy="32" rx="28" ry="18" fill="url(#lensGrad)" rx="28" ry="18"/>

  <!-- Lens highlight -->
  <ellipse cx="32" cy="32" rx="26" ry="16" fill="url(#glowGrad)" opacity="0.3"/>

  <!-- Inner lens circle (pupil) -->
  <circle cx="32" cy="32" r="9" fill="#1E1B4B"/>
  <circle cx="32" cy="32" r="7" fill="#2D2A6E"/>

  <!-- Data bars inside pupil (mini chart) -->
  <rect x="27" y="34" width="2.5" height="4" rx="0.5" fill="#818CF8"/>
  <rect x="30.5" y="31" width="2.5" height="7" rx="0.5" fill="#A78BFA"/>
  <rect x="34" y="29" width="2.5" height="9" rx="0.5" fill="#C4B5FD"/>

  <!-- Lens rim reflection (top-left glint) -->
  <ellipse cx="20" cy="26" rx="5" ry="2.5" fill="white" opacity="0.15" transform="rotate(-30 20 26)"/>

  <!-- Sharp edge lines of the lens shape (top and bottom curves outline) -->
  <path d="M4 32 Q18 14 32 14 Q46 14 60 32 Q46 50 32 50 Q18 50 4 32 Z" 
        fill="none" stroke="white" stroke-width="1.2" stroke-opacity="0.25"/>
</svg>
